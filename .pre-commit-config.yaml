# Local pre-commit hooks mirroring CI lint/security checks so contributors
# catch issues before pushing. Install once:  pre-commit install
# Run on demand:  pre-commit run --all-files
# https://pre-commit.com

repos:
  # Basic file hygiene (trailing whitespace, EOF newlines, JSON/YAML valid).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=512']
      - id: check-json
      - id: check-yaml
        # GitHub Actions workflows use !!include-style references shellcheck-py
        # parses fine. Workflow YAML lints in CI already; skip here.
        exclude: ^\.github/workflows/
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs

  # Shell script linting (matches the CI shellcheck job).
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

  # Dockerfile linting (matches the CI Hadolint job).
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  # GitHub Actions workflow linting (matches the CI actionlint job).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Secrets scan (matches the CI gitleaks job).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
