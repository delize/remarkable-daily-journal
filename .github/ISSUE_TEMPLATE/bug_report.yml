name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail
        that someone else can reproduce the problem.

        **Security issues:** please do **not** file a public bug. Use
        [private reporting](https://github.com/delize/remarkable-daily-journal/security/advisories/new) instead.

  - type: input
    id: image_version
    attributes:
      label: Image version
      description: Output of `docker image inspect ghcr.io/delize/remarkable-daily-journal:<tag> --format '{{.Config.Labels}}'`, or the tag you pulled (e.g. `v2.2.0`, `latest`, `sha-abc1234`).
      placeholder: "v2.2.0"
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: reMarkable hardware
      description: Which device(s) are involved?
      multiple: true
      options:
        - rmpp (Paper Pro)
        - rmppm (Paper Pro Move)
        - rm2 (reMarkable 2)
        - rm1 (reMarkable 1)
        - N/A
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
      placeholder: |
        1. Set TEMPLATE_STYLE=...
        2. Ran `docker compose run --rm remarkable-daily-journal run`
        3. Expected ..., saw ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste container logs (`docker compose logs`) — redact any tokens.
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant environment variables from your `docker-compose.yml` (redact secrets).
      render: yaml
    validations:
      required: false
