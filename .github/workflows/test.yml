name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Shellcheck Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_paths: tests

  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check script syntax
        run: |
          echo "Checking bash syntax..."
          for script in *.sh; do
            if [ -f "$script" ]; then
              echo "  Checking $script..."
              bash -n "$script"
            fi
          done
          echo "All scripts passed syntax check!"

  unit-tests:
    name: Unit Tests (Bats)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install ghostscript (for PDF tests)
        run: sudo apt-get install -y ghostscript

      - name: Run bats tests
        run: |
          chmod +x *.sh
          bats tests/*.bats

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint, syntax]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: remarkable-daily-journal:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image runs
        run: |
          # Build without buildx for local testing
          docker build -t remarkable-daily-journal:test .

          # Test help command
          docker run --rm remarkable-daily-journal:test help || true

          # Verify scripts are in place
          docker run --rm remarkable-daily-journal:test shell -c "ls -la /app/*.sh"

          echo "Docker image build and basic tests passed!"

  integration-test:
    name: Integration Test (Dry Run)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t remarkable-daily-journal:test .

      - name: Run dry-run test
        run: |
          # Test the dry run mode (doesn't require authentication)
          docker run --rm \
            -e DRY_RUN=true \
            -e REMARKABLE_FOLDER="/Test Journal" \
            -e TEMPLATE_PAGES=2 \
            remarkable-daily-journal:test shell -c "DRY_RUN=true /app/create-daily-note.sh"

      - name: Test cleanup script (dry environment)
        run: |
          # Test cleanup script initialization
          docker run --rm \
            -e CLEANUP_ENABLED=false \
            remarkable-daily-journal:test shell -c "/app/cleanup-old-journals.sh"
