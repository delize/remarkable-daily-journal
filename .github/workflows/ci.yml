name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Force-pushes to a PR cancel its in-flight CI run. main and tag runs are never
# cancelled (the group includes the ref, so each push/tag is its own group).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  #############################################
  # Stage 1: Lint and Syntax Checks
  #############################################
  lint:
    name: Shellcheck Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: tests

  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check script syntax
        run: |
          echo "Checking bash syntax..."
          for script in *.sh; do
            if [ -f "$script" ]; then
              echo "  Checking $script..."
              bash -n "$script"
            fi
          done
          echo "All scripts passed syntax check!"

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  actionlint:
    name: Actionlint (Workflows)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION=1.7.12
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin actionlint
          actionlint -version

      - name: Lint workflows
        run: actionlint -color

  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan every commit, not just HEAD.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan repository (history + working tree)
        run: gitleaks detect --no-banner --verbose --redact --exit-code 1

  #############################################
  # Stage 2: Unit Tests
  #############################################
  unit-tests:
    name: Unit Tests (Bats)
    runs-on: ubuntu-latest
    needs: [lint, syntax, hadolint, actionlint, secrets-scan]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats tests
        run: |
          chmod +x ./*.sh
          bats tests/*.bats

  #############################################
  # Stage 3: Docker Build, Test, and Push
  #############################################
  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [unit-tests]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for testing (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: remarkable-daily-journal:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image runs
        run: |
          # Test help command
          docker run --rm remarkable-daily-journal:test help || true

          # Verify scripts are in place
          docker run --rm remarkable-daily-journal:test shell -c "ls -la /app/*.sh"

          # Test dry run mode
          docker run --rm \
            -e DRY_RUN=true \
            -e REMARKABLE_FOLDER="/Test Journal" \
            -e TEMPLATE_PAGES=2 \
            remarkable-daily-journal:test shell -c "DRY_RUN=true /app/create-daily-note.sh"

          # Test cleanup script initialization
          docker run --rm \
            -e CLEANUP_ENABLED=false \
            remarkable-daily-journal:test shell -c "/app/cleanup-old-journals.sh"

          echo "All Docker tests passed!"

      # Catch HIGH/CRITICAL CVEs in OS packages (the part we control via the
      # Alpine base — Dependabot bumps it). Scope is intentionally OS only:
      # library-level findings are dominated by Go stdlib CVEs in the rmapi
      # binary, which depend on ddvk/rmapi's pinned Go version and cannot be
      # fixed from this repo. Those are tracked separately by deliberate
      # RMAPI_VERSION bumps; gating CI on them would block every release.
      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: remarkable-daily-journal:test
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os

      # Push steps only run on main branch or tags, not on PRs
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set latest tag for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with branch name
            type=ref,event=branch
            # Tag with git tag (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with sha
            type=sha,prefix=

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach SBOM (what's in the image) and SLSA provenance (how it was
          # built) so downstream users can inspect/verify the artifact.
          sbom: true
          provenance: mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Docker Image Published"
            echo ""
            echo "**Images pushed:**"
            echo '```'
            echo "${IMAGE_TAGS}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
