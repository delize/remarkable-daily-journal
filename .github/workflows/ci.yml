name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  #############################################
  # Stage 1: Lint and Syntax Checks
  #############################################
  lint:
    name: Shellcheck Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_paths: tests

  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check script syntax
        run: |
          echo "Checking bash syntax..."
          for script in *.sh; do
            if [ -f "$script" ]; then
              echo "  Checking $script..."
              bash -n "$script"
            fi
          done
          echo "All scripts passed syntax check!"

  #############################################
  # Stage 2: Unit Tests
  #############################################
  unit-tests:
    name: Unit Tests (Bats)
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install ghostscript (for PDF tests)
        run: sudo apt-get install -y ghostscript

      - name: Run bats tests
        run: |
          chmod +x *.sh
          bats tests/*.bats

  #############################################
  # Stage 3: Docker Build Validation
  #############################################
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: remarkable-daily-journal:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image runs
        run: |
          # Test help command
          docker run --rm remarkable-daily-journal:test help || true

          # Verify scripts are in place
          docker run --rm remarkable-daily-journal:test shell -c "ls -la /app/*.sh"

          # Test dry run mode
          docker run --rm \
            -e DRY_RUN=true \
            -e REMARKABLE_FOLDER="/Test Journal" \
            -e TEMPLATE_PAGES=2 \
            remarkable-daily-journal:test shell -c "DRY_RUN=true /app/create-daily-note.sh"

          # Test cleanup script initialization
          docker run --rm \
            -e CLEANUP_ENABLED=false \
            remarkable-daily-journal:test shell -c "/app/cleanup-old-journals.sh"

          echo "All Docker tests passed!"

  #############################################
  # Stage 4: Build and Push to Registry
  #############################################
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only push on main branch or tags, not on PRs
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set latest tag for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with branch name
            type=ref,event=branch
            # Tag with git tag (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with sha
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
