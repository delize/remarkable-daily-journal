version: "3.8"

services:
  remarkable-daily-journal:
    # Option 1: Use pre-built image from GitHub Container Registry
    # image: ghcr.io/delize/remarkable-daily-journal:latest

    # Option 2: Build from source (default)
    build: .
    image: remarkable-daily-journal:latest
    container_name: remarkable-daily-journal
    restart: unless-stopped
    
    # Run in scheduled daemon mode
    command: schedule
    
    # Persist rmapi authentication - choose ONE option:
    volumes:
      # Option A: Docker named volume (managed by Docker)
      - rmapi-config:/app/.config/rmapi

      # Option B: Bind mount to local directory (uncomment and adjust path)
      # - ./config/rmapi:/app/.config/rmapi
      # - /path/to/your/rmapi-config:/app/.config/rmapi

    environment:
      # Timezone - set to your local timezone
      - TZ=Europe/Stockholm
      
      # Schedule: when to create daily notes (cron format)
      # Default: 6:00 AM daily
      - CRON_SCHEDULE=0 6 * * *
      
      # reMarkable folder to store daily journals
      - REMARKABLE_FOLDER=/Daily Journal
      
      # Date format for the notebook name
      - DATE_FORMAT=%Y-%m-%d

      # Notebook name (strftime). Defaults to DATE_FORMAT. Add text to taste,
      # e.g. "Journal %Y-%m-%d" or "%Y-%m-%d - Work". Keep an ISO date in it so
      # cleanup can recognise journals.
      # - JOURNAL_NAME_FORMAT=%Y-%m-%d

      # Pages per notebook. 1 is enough: pages you add on the device inherit
      # the current page's template automatically.
      - TEMPLATE_PAGES=1

      # Built-in reMarkable template to apply to each page. Friendly aliases:
      # blank, lined, grid, checklist. Or set a raw template name, e.g.
      # TEMPLATE_STYLE=P Dots S  (see docs/templates/<hardware>.md for the list)
      - TEMPLATE_STYLE=lined

      # Device whose template list to validate TEMPLATE_STYLE against (warn only).
      # rmpp = Paper Pro (default), rm2 = reMarkable 2, rm1 = reMarkable 1.
      - TEMPLATE_HARDWARE=rmpp

      # Cleanup settings for unused journals
      # Set to "false" to disable cleanup of unused journals
      - CLEANUP_ENABLED=true

      # Keep journals modified within this many hours (by the cloud's
      # ModifiedClient time); older journals that are still empty get removed.
      # Setting CLEANUP_KEEP_DAYS instead also works and derives this.
      - CLEANUP_KEEP_HOURS=48

      # A page .rm at/below this size (bytes) counts as unwritten, so a notebook
      # whose pages are all blank gets cleaned up. Raise if light notes vanish.
      - EMPTY_RM_MAX_BYTES=1000

      # Set to "true" to log what cleanup WOULD delete without removing anything.
      # Useful for a first run to confirm it only targets empty journals.
      - CLEANUP_DRY_RUN=false

      # Fallback size threshold (bytes) for non-ZIP downloads
      - SIZE_THRESHOLD=25000

      # --- Health reporting to GitHub Issues (optional) ---
      # If both are set, the container opens ONE GitHub issue per failure mode
      # when a run fails (reMarkable cloud/API error, auth/token problem, or a
      # journal error) and auto-closes it on the next successful run. Leave
      # unset to disable. The token needs Issues read+write on the repo
      # (classic PAT: 'repo' scope; fine-grained PAT: Issues: Read and write).
      # Prefer passing the token via a .env file or Docker secret, not inline.
      # - GITHUB_REPO=delize/remarkable-daily-journal
      # - GITHUB_TOKEN=${GITHUB_TOKEN}

# Only needed if using Option A (Docker named volume)
# Comment out this section if using Option B (bind mount)
volumes:
  rmapi-config:
    name: rmapi-config
